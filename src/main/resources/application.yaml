server:
  port: 9090

spring:
  application:
    name: student-api
  datasource:
    url: jdbc:mysql://localhost:3306/student_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect